name: flashcard_mobile
description: Flutter mobile client for the Flashcard app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.9.0

  # State management & routing
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2

  # Auth (OIDC / Zitadel)
  flutter_appauth: ^12.0.0
  flutter_secure_storage: ^10.0.0

  # Local persistence
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # Files, PDFs, images, camera
  file_picker: ^11.0.0
  pdfx: ^2.9.0
  camera: ^0.12.0
  image_picker: ^1.2.0
  flutter_image_compress: ^2.4.0

  # UI
  flutter_card_swiper: ^7.2.0

  # App metadata + connectivity + small prefs (used by Settings page)
  package_info_plus: ^8.1.1
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Pulled in transitively, but we import its FlutterSecureStoragePlatform
  # directly from tests to swap an in-memory backend.
  flutter_secure_storage_platform_interface: ^2.0.0

  # Codegen for drift
  build_runner: ^2.14.0
  drift_dev: ^2.32.1
  # NOTE: riverpod_generator/_annotation and custom_lint/riverpod_lint
  # omitted for now — their analyzer ranges conflict with drift_dev's. Add
  # back once the ecosystem reconverges. Manual Provider definitions in
  # lib/core/ avoid the need for riverpod_generator.

  # App icon + splash generators. Source PNGs live under
  # assets/branding/. These are placeholders; replace the source files
  # with designer-supplied art and rerun:
  #   dart run flutter_launcher_icons
  #   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/icon.png
  adaptive_icon_background: "#3F51B5"
  adaptive_icon_foreground: assets/branding/icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#3F51B5"
  image: assets/branding/splash_logo.png
  android_12:
    color: "#3F51B5"
    image: assets/branding/splash_logo.png
  android: true
  ios: true
