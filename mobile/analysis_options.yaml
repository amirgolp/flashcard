include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  language:
    # strict-inference is disabled because riverpod's `ref.watch`/`ref.read`
    # rely on inference through generic Provider types and the analyzer
    # can't see through them; the warnings are noise, not real bugs.
    # strict-casts and strict-raw-types still catch the dynamic mistakes
    # that matter.
    strict-casts: true
    strict-raw-types: true

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    avoid_print: true
