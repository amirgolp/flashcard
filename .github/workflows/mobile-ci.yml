name: mobile-ci

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

defaults:
  run:
    working-directory: mobile

env:
  FLUTTER_VERSION: "3.41.7"
  FLUTTER_CHANNEL: "stable"

jobs:
  analyze-test:
    name: analyze + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: drift codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter analyze
        run: flutter analyze --fatal-infos

      - name: flutter test
        run: flutter test --reporter expanded

  build-android:
    name: build Android debug APK
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: drift codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter build apk --debug
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: flashcard-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

  build-ios:
    name: build iOS (no codesign)
    runs-on: macos-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: drift codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter build ios --no-codesign --debug
        run: flutter build ios --no-codesign --debug
